<!DOCTYPE html>

  <script>
  // GH Pages SPA restore
  (function(){
    try{
      var u=new URL(window.location.href);
      var p=u.searchParams.get('p');
      if(p){
        var base=(window.__GH_BASE__||'').replace(/\/$/,'');
        window.history.replaceState(null,'', base + p + u.hash);
      }
    }catch(e){}
  })();
  </script>
