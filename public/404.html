<!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting…</title>
<meta http-equiv="refresh" content="0; url=./index.html">
<script>(function(){var l=location;var base=(window.__GH_BASE__||'').replace(/\/$/,'');var p=l.pathname.replace(new RegExp('^'+base),'');l.replace(base+'/index.html?p='+encodeURIComponent(p+l.search)+l.hash);})();</script>
</head><body></body></html>
